<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload Public Video</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #0f172a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    color: white;
    margin: 0;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #020617;
    padding: 15px 30px;
    border-bottom: 1px solid #1e293b;
}

.nav-links a {
    margin-right: 20px;
    color: #94a3b8;
    text-decoration: none;
    transition: color 0.2s;
}

.nav-links a:hover { color: white; }

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 70px);
    padding: 40px 20px;
}

.card {
    background: #1e293b;
    padding: 40px;
    border-radius: 16px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

.card h2 {
    margin-bottom: 24px;
    color: #38bdf8;
}

.info-badge {
    background: #0f172a;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #94a3b8;
    text-align: center;
}

input, textarea, select {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    margin-bottom: 16px;
    border: 1px solid #334155;
    border-radius: 8px;
    background: #0f172a;
    color: white;
    font-size: 14px;
}

input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: #38bdf8;
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    border: none;
    color: white;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
}

button:hover { opacity: 0.9; }
button:active { transform: scale(0.98); }

#result {
    margin-top: 16px;
    text-align: center;
    font-size: 14px;
    padding: 10px;
    border-radius: 8px;
}

.result-success {
    background: #166534;
    color: #86efac;
}

.result-error {
    background: #991b1b;
    color: #fca5a5;
}

.result-loading {
    background: #1e3a8a;
    color: #93c5fd;
}
</style>
</head>
<body>
<div class="navbar">
    <div style="font-weight: bold; color: #38bdf8;">AI Video Guide</div>
    <div class="nav-links">
        <a href="home_feed.html">Home</a>
        <a href="upload_video.html">Upload</a>
        <a href="home.html">AI Guide</a>
        <a href="my_account.html">My Account</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2>📤 Upload Public Video</h2>
        
        <div class="info-badge">
            🌍 This video will be visible to everyone on the Home Feed
        </div>
        
        <input type="text" id="title" placeholder="Video Title" autocomplete="off">
        <textarea id="description" rows="3" placeholder="Description (optional)"></textarea>
        <input type="text" id="category" placeholder="Category (e.g., Cooking, Tech, Fitness)" autocomplete="off">
        <input type="file" id="videoFile" accept="video/mp4,video/mov,video/avi,video/mkv,video/webm">
        
        <button onclick="uploadVideo()">🚀 Upload to Public Feed</button>
        
        <div id="result"></div>
    </div>
</div>

<script>
const SERVER = "http://127.0.0.1:5000";
const user_id = localStorage.getItem("user_id");

function showResult(message, type) {
    const resultEl = document.getElementById("result");
    resultEl.textContent = message;
    resultEl.className = `result-${type}`;
}

async function uploadVideo() {
    const fileInput = document.getElementById("videoFile");
    const file = fileInput.files[0];
    const title = document.getElementById("title").value.trim();
    const description = document.getElementById("description").value.trim();
    const category = document.getElementById("category").value.trim();
    
    if (!file) {
        alert("Please select a video file");
        return;
    }
    
    if (!title) {
        alert("Please enter a title");
        return;
    }
    
    if (!user_id || user_id === 'null') {
        alert("Please login first");
        window.location.href = "index.html";
        return;
    }
    
    showResult("Uploading... ⏳", "loading");
    
    const formData = new FormData();
    formData.append("video", file);
    formData.append("title", title);
    formData.append("description", description);
    formData.append("category", category || "General");
    formData.append("user_id", user_id);
    formData.append("video_type", "public");  // KEY: Marks as public for home feed
    
    try {
        const response = await fetch(`${SERVER}/upload-video`, {
            method: "POST",
            body: formData
        });
        
        const data = await response.json();
        
        if (data.success || data.filename) {
            showResult("✅ Upload successful! Redirecting...", "success");
            
            if (data.filename && (title || description || category)) {
                await fetch(`${SERVER}/save-meta`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        filename: data.filename,
                        title: title,
                        description: description,
                        category: category || "General"
                    })
                }).catch(() => {});
            }
            
            setTimeout(() => {
                window.location.href = "home_feed.html";
            }, 1500);
        } else {
            showResult("❌ Upload failed: " + (data.error || "Unknown error"), "error");
        }
    } catch(e) {
        console.error("Upload error:", e);
        showResult("❌ Network error. Check if server is running.", "error");
    }
}
</script>
</body>
</html>
